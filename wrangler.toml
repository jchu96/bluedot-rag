name = "bluedot-rag"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Vars (non-secret, set via setup script)
[vars]
OPENAI_EXTRACTION_MODEL = "gpt-5.4-nano"
NOTION_TRANSCRIPTS_DATA_SOURCE_ID = "70c2fa08-d518-4704-810c-e0061941ebe1"
NOTION_FOLLOWUPS_DATA_SOURCE_ID = "d2a8aa9c-c1c5-4990-87a5-a20a10e2c5fb"
BASE_URL = "https://bluedot-rag.jeremy-chu.workers.dev"
ALLOWED_USERS = "jchu96"
# GITHUB_CLIENT_ID is a public value but set via setup script / secret for convenience
# GITHUB_CLIENT_ID = "<set after registering OAuth App at https://github.com/settings/developers>"

[[d1_databases]]
binding = "DB"
database_name = "bluedot-rag-db"
database_id = "8aab7a8b-e319-4f96-a1ce-175540a266cc"
migrations_dir = "drizzle"

[[vectorize]]
binding = "VECTORIZE"
index_name = "bluedot-rag-vectors"
remote = true

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "aa6b9d7a73254298b7b6c0f72ea64fa8"

# Secrets (set via `wrangler secret put`):
# - OPENAI_API_KEY
# - NOTION_INTEGRATION_KEY
# - BLUEDOT_WEBHOOK_SECRET
# - GITHUB_CLIENT_ID        (OAuth App client id; public but stored as secret for easy rotation)
# - GITHUB_CLIENT_SECRET    (OAuth App client secret)

[observability]
enabled = true
